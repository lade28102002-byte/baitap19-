<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang chủ - Bài tập HTML</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
max-width:750px;
width:100%;
text-align:center;
}

h1{
color:#2c3e50;
margin-bottom:15px;
}

h2{
margin:8px 0;
color:#444;
}

h3{
margin:25px 0 15px;
color:#2196f3;
}

.images{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.images img{
width:300px;
max-width:100%;
border-radius:12px;
border:2px solid #ddd;
transition:.3s;
}

.images img:hover{
transform:scale(1.03);
}

a{
display:inline-block;
margin-top:25px;
padding:12px 24px;
background:#2196f3;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:.3s;
}

a:hover{
background:#1565c0;
}

</style>

</head>

<body>

<div class="container">

<h1>THÔNG TIN SINH VIÊN</h1>

<h2>Họ và tên: Lê Đình Tuấn Hưng</h2>

<h2>Mã số sinh viên: 241A300757</h2>

<h3>Kết quả Bài tập 17</h3>

<div class="images">

<img src="IMG_0153.png" alt="Bài tập 17">

<img src="IMG_0154.png" alt="Bài tập 17">

</div>

<a href="baitap19.html">🎮 Mở Bài tập 19</a>

</div>

</body>
</html>
