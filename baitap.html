<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Memory Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Trebuchet MS',sans-serif;
}

body{
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
text-align:center;
color:white;
max-width:700px;
width:100%;
}

h1{
margin-bottom:10px;
font-size:32px;
}

#moves{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ffd166;
color:#222;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ffb703;
transform:scale(1.05);
}

.game{
display:grid;
grid-template-columns:repeat(2,120px);
gap:18px;
justify-content:center;
margin-top:25px;
}

@media(min-width:768px){
.game{
grid-template-columns:repeat(4,120px);
}
}

.card{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:.6s;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:46px;
backface-visibility:hidden;
}

.front{
background:linear-gradient(135deg,#ff006e,#fb5607);
color:white;
}

.back{
background:white;
color:#333;
transform:rotateY(180deg);
}

.card:hover{
transform:translateY(-6px);
}

</style>

</head>

<body>

<div class="container">

<h1>🎵 Music Memory Game</h1>

<p id="moves">Số lượt: 0</p>

<button onclick="resetGame()">Chơi lại</button>

<main class="game" id="game"></main>

</div>

<script>

const icons=[
"🎧","🎧",
"🎮","🎮",
"🎤","🎤",
"🎬","🎬"
];

let firstCard=null;
let secondCard=null;
let lock=false;
let moves=0;
let matched=0;

const game=document.getElementById("game");
const moveText=document.getElementById("moves");

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

}

function createGame(){

game.innerHTML="";

shuffle(icons);

icons.forEach(icon=>{

const card=document.createElement("div");

card.className="card";

card.dataset.icon=icon;

card.innerHTML=`
<div class="inner">
<div class="front">🎼</div>
<div class="back">${icon}</div>
</div>
`;

card.onclick=()=>flipCard(card);

game.appendChild(card);

});

}

function flipCard(card){

if(lock) return;

if(card===firstCard) return;

if(card.classList.contains("matched")) return;

card.classList.add("flip");

if(!firstCard){

firstCard=card;

return;

}

secondCard=card;

moves++;

moveText.innerHTML="Số lượt: "+moves;

checkMatch();

}

function checkMatch(){

if(firstCard.dataset.icon===secondCard.dataset.icon){

firstCard.classList.add("matched");

secondCard.classList.add("matched");

matched++;

firstCard=null;

secondCard=null;

if(matched===4){

setTimeout(()=>{

alert("🏆 Chúc mừng! Bạn đã hoàn thành trò chơi!");

},300);

}

}else{

lock=true;

setTimeout(()=>{

firstCard.classList.remove("flip");

secondCard.classList.remove("flip");

firstCard=null;

secondCard=null;

lock=false;

},900);

}

}

function resetGame(){

moves=0;

matched=0;

firstCard=null;

secondCard=null;

moveText.innerHTML="Số lượt: 0";

createGame();

}

createGame();

</script>

</body>
</html>
